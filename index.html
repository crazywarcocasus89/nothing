        // ==================== SCREAMER CON WEBAUDIO (OSCILADORES AGRESIVOS) ====================
        function startWebAudioScream() {
            if (isPlaying) return;
            
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                gainNode = audioCtx.createGain();
                gainNode.gain.value = 1.0;
                gainNode.connect(audioCtx.destination);
                
                // Oscilador principal (grito agudo)
                oscillator = audioCtx.createOscillator();
                oscillator.type = 'sawtooth'; // sonido agresivo
                oscillator.frequency.value = 880; // nota La aguda
                
                // Modulación de frecuencia para efecto de grito
                const lfo = audioCtx.createOscillator();
                lfo.frequency.value = 15;
                const lfoGain = audioCtx.createGain();
                lfoGain.gain.value = 200;
                lfo.connect(lfoGain);
                lfoGain.connect(oscillator.frequency);
                
                oscillator.connect(gainNode);
                oscillator.start();
                lfo.start();
                
                // Segundo oscilador más agudo
                const oscillator2 = audioCtx.createOscillator();
                oscillator2.type = 'square';
                oscillator2.frequency.value = 1320;
                oscillator2.connect(gainNode);
                oscillator2.start();
                
                // Tercer oscilador con ruido
                const bufferSize = 4096;
                const noiseNode = audioCtx.createScriptProcessor(bufferSize, 1, 1);
                noiseNode.onaudioprocess = function(e) {
                    const output = e.outputBuffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        output[i] = (Math.random() - 0.5) * 0.8;
                    }
                };
                noiseNode.connect(gainNode);
                
                audioCtx.resume();
                isPlaying = true;
                
                // Reforzar volumen constantemente
                setInterval(() => {
                    if (gainNode) gainNode.gain.value = 1.0;
                }, 100);
                
            } catch(e) {
                console.log("WebAudio error, usando fallback");
            }
        }
